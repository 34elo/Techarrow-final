name: geo-vyzov

services:
  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "${WEB_PORT:-3000}:3000"
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "${ADMIN_PORT:-3001}:3000"
    restart: unless-stopped
