name: techarrow_2026_app
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  go_router: ^17.2.2
  http: ^1.2.0
  chopper: ^8.5.1
  jwt_decoder: ^2.0.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.3
  flutter_map: ^8.2.1
  latlong2: ^0.9.1
  pedometer: ^4.2.0
  permission_handler: ^12.0.1
  image_picker: ^1.2.1
  bottom_picker: ^4.1.1
  flutter_dotenv: ^6.0.1
  geolocator: ^14.0.2
  path_provider: ^2.1.5
  share_plus: ^12.0.2
  image: ^4.8.0
  http_parser: ^4.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  chopper_generator: ^8.0.3
  json_serializable: ^6.8.0
  swagger_dart_code_generator: ^4.1.1
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.example
    - assets/abstract.png
    - assets/icons/icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/icon.png
  remove_alpha_ios: true

flutter_native_splash:
  image: assets/icons/icon.png
  color: "#FFFFFF"
  android_12:
    image: assets/icons/icon.png
    icon_background_color: "#FFFFFF"
